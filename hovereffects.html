<!DOCTYPE html>
<html>
    <head>
        <title>
            Hover Effects and Transitions
        </title>
    </head>
    <style>
        body{
            text-align: center;
        }
        .btn{
            padding: 20px;
            margin: 10px;
            background: blue;
            color: rgb(248, 248, 248);
        }
        .btn:hover{
            background-color: green;
        }
        .card{
            padding: 20px;
            margin: 10px;
            width: 200px;
            background-color: gray;
            border-radius: 10px;
        }
        .card:hover{
            transform: translateY(-10px);
        }
    </style>
    <body>
        <h1>
            CSS Hover Effects and Transition
        </h1>
        <button class="btn">Hover Me</button>
        <div class="card">
            <h> Hover Card </h3>
            <p>
                This card moves upward when hovered
            </p>
        </div>
    </body>
</html>
