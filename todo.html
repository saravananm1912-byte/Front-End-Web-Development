<!DOCTYPE html>
<html>
<body>

<input id="task" placeholder="Task">
<button onclick="add()">Add</button>

<ul id="list"></ul>

<script>
function add() {
  let t = task.value;
  if(t=="") return;

  let li = document.createElement("li");
  li.innerText = t;

  li.onclick = () => li.remove();

  list.appendChild(li);
  task.value = "";
}
</script>

</body>
</html>
